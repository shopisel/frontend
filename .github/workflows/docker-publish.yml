name: CI - Main (Build & Deploy Frontend)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: 0.3.181

      - name: Deploy to Fly.io with fallback
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          if flyctl deploy; then
            echo "Primary deploy succeeded."
          else
            echo "Primary deploy failed. Retrying with local-only build..."
            flyctl deploy --local-only
          fi
